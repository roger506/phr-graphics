<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1350px; }
  body {
    background: radial-gradient(120% 90% at 20% 0%, #14335c 0%, #0b1f3a 55%, #081729 100%);
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    padding: 90px 96px 72px 96px;
    position: relative;
    overflow: hidden;
  }
  .rule-top {
    position: absolute; top: 0; left: 0; right: 0; height: 14px;
    background: linear-gradient(90deg, #a8841c, #d9b544, #a8841c);
  }
  .logo { height: 120px; margin-bottom: 84px; }
  .logo img { height: 100%; }
  .kicker {
    font-size: 30px; font-weight: 600; letter-spacing: 7px;
    color: #d9b544; text-transform: uppercase; margin-bottom: 42px;
  }
  h1 {
    font-family: 'Libre Caslon Text', Georgia, serif;
    font-weight: 700; font-size: 92px; line-height: 1.14;
    letter-spacing: -0.5px;
  }
  h1 .gold { color: #d9b544; }
  .divider { width: 170px; height: 6px; background: #d9b544; margin: 56px 0; }
  .sub {
    font-size: 40px; line-height: 1.45; color: #cfd9e6; font-weight: 400;
    max-width: 830px;
  }
  .spacer { flex: 1; }
  .tagline {
    font-family: 'Libre Caslon Text', Georgia, serif; font-style: italic;
    font-size: 34px; color: #d9b544; margin-bottom: 26px;
  }
  .footer {
    border-top: 2px solid rgba(217, 181, 68, 0.45);
    padding-top: 30px;
    font-size: 26px; color: #e8edf3; font-weight: 500; letter-spacing: 0.3px;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="rule-top"></div>
  <div class="logo"><img src="../../assets/phr_logo_white.png" alt="Prestige Heritage Realty"></div>
  <div class="kicker">Florida Property Tax Shakeup</div>
  <h1>Your August tax notice will not look like <span class="gold">last year's.</span></h1>
  <div class="divider"></div>
  <div class="sub">A new state law just changed how your property tax rate gets set. Here is what to watch for.</div>
  <div class="spacer"></div>
  <div class="tagline">Straight answers. Deep roots.</div>
  <div class="footer">Roger Averbuj, Broker &nbsp;|&nbsp; Prestige Heritage Realty &nbsp;|&nbsp; (954) 663-8461</div>
</body>
</html>
